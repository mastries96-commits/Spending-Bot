<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a1a;padding:20px}
.header{margin-bottom:24px}
h1{font-size:24px;font-weight:500}
.month{color:#888;font-size:14px;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:20px;border:1px solid #e8e8e0}
.card-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#888;margin-bottom:8px}
.card-value{font-size:28px;font-weight:300}
.card-value.green{color:#1a7a4a}
.card-value.red{color:#c0392b}
.bar-wrap{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #e8e8e0}
.bar-track{height:8px;background:#f0f0e8;border-radius:4px;margin:12px 0}
.bar-fill{height:100%;border-radius:4px;background:#1a7a4a;transition:width 0.5s}
.bar-fill.warn{background:#e67e22}
.bar-fill.danger{background:#c0392b}
.txs{background:#fff;border-radius:12px;padding:20px;border:1px solid #e8e8e0}
.tx{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0e8}
.tx:last-child{border-bottom:none}
.tx-left{font-size:14px}
.tx-cat{font-weight:500}
.tx-desc{color:#888;font-size:12px;margin-top:2px}
.tx-right{text-align:right}
.tx-amount{font-weight:500}
.tx-amount.debit{color:#c0392b}
.tx-amount.credit{color:#1a7a4a}
.tx-date{font-size:12px;color:#888}
.empty{color:#888;text-align:center;padding:32px;font-size:14px}
.status{display:flex;justify-content:space-between;font-size:13px;color:#888;margin-top:4px}
</style>
</head>
<body>
<div class="header">
  <h1>💰 Expense Tracker</h1>
  <div class="month" id="month-label"></div>
</div>
<div class="grid" id="stats"></div>
<div class="bar-wrap">
  <div class="card-label">Budget Used</div>
  <div class="bar-track"><div class="bar-fill" id="bar" style="width:0%"></div></div>
  <div class="status"><span id="bar-pct">0%</span><span id="bar-status"></span></div>
</div>
<div class="txs">
  <div class="card-label" style="margin-bottom:12px">Recent Transactions</div>
  <div id="tx-list"></div>
</div>
<script>
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const f2=n=>(+n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const monthOf=d=>(d||new Date().toISOString().slice(0,10)).slice(0,7);
const nowMonth=()=>monthOf();

async function load(){
  try{
    const r=await fetch('/api/data');
    const d=await r.json();
    render(d);
  }catch(e){
    document.getElementById('tx-list').innerHTML='<div class="empty">Could not connect to bot server.</div>';
  }
}

function render(d){
  const month=nowMonth();
  const [y,mo]=month.split('-');
  document.getElementById('month-label').textContent=`${MN[+mo-1]} ${y}`;

  const rows=(d.transactions||[]).filter(t=>monthOf(t.date)===month);
  const fixed=(d.fixedCosts||[]).reduce((s,f)=>s+(+f.amount),0);
  let income=0,variable=0;
  rows.forEach(t=>{ if(t.type==='credit') income+=+t.amount; else variable+=+t.amount; });
  const total=fixed+variable;
  const left=income-total;
  const pct=income>0?Math.min(100,total/income*100):0;

  document.getElementById('stats').innerHTML=`
    <div class="card"><div class="card-label">Income</div><div class="card-value green">${f2(income)} AED</div></div>
    <div class="card"><div class="card-label">Fixed Costs</div><div class="card-value">${f2(fixed)} AED</div></div>
    <div class="card"><div class="card-label">Variable Spent</div><div class="card-value">${f2(variable)} AED</div></div>
    <div class="card"><div class="card-label">Remaining</div><div class="card-value ${left>=0?'green':'red'}">${f2(left)} AED</div></div>
  `;

  const bar=document.getElementById('bar');
  bar.style.width=pct+'%';
  bar.className='bar-fill'+(pct>=100?' danger':pct>=80?' warn':'');
  document.getElementById('bar-pct').textContent=pct.toFixed(1)+'%';
  document.getElementById('bar-status').textContent=pct>=100?'🔴 Over budget':pct>=80?'🟡 Near limit':'🟢 On track';

  const recent=[...(d.transactions||[])].reverse().slice(0,20);
  document.getElementById('tx-list').innerHTML=recent.length?recent.map(t=>{
    const sign=t.type==='credit'?'+':'-';
    return `<div class="tx">
      <div class="tx-left"><div class="tx-cat">${t.category}</div><div class="tx-desc">${t.description||''}</div></div>
      <div class="tx-right"><div class="tx-amount ${t.type}">${sign}${f2(t.amount)} AED</div><div class="tx-date">${t.date}</div></div>
    </div>`;
  }).join(''):'<div class="empty">No transactions this month yet.</div>';
}

load();
setInterval(load,30000);
</script>
</body>
</html>
